<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake</title>
    <style>
        body { background: #1a1a2e; color: #eaeaea; font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { color: #00ff9f; margin-bottom: 5px; }
        canvas { border: 4px solid #00ff9f; border-radius: 8px; background: #16213e; cursor: pointer; }
        .score { font-size: 22px; margin: 12px 0; color: #ffd700; }
        .instructions { color: #aaa; font-size: 14px; text-align: center; max-width: 400px; }
        button { background: #00ff9f; color: #1a1a2e; border: none; padding: 10px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #00cc7a; }
    </style>
</head>
<body>
    <h1>🐍 Classic Snake</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="game" width="480" height="480"></canvas>
    <div class="instructions">
        Arrow Keys / WASD to move • Space to pause • R to restart<br>
        <span style="color:#ff4757">Red</span> = +1 &nbsp;&nbsp; <span style="color:#ffd700">Gold</span> = +2 + ripple explosion
    </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const gridSize = 20;
const tileCount = 24;

let snake = [];
let vx = 1, vy = 0;
let food = {x: 18, y: 18};
let bonusFood = null;
let score = 0;
let interval = null;
let running = false;
let paused = false;
let ripples = [];

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#00ff9f';
  for (let i = 0; i < snake.length; i++) {
    ctx.fillRect(snake[i].x * gridSize, snake[i].y * gridSize, gridSize - 2, gridSize - 2);
  }

  ctx.fillStyle = '#ff4757';
  ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

  if (bonusFood) {
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(bonusFood.x * gridSize + 2, bonusFood.y * gridSize + 2, gridSize - 6, gridSize - 6);
    ctx.fillStyle = '#fff8dc';
    ctx.fillRect(bonusFood.x * gridSize + 5, bonusFood.y * gridSize + 5, 4, 4);
  }

  for (let i = 0; i < ripples.length; i++) {
    const r = ripples[i];
    ctx.strokeStyle = `rgba(255, 215, 0, ${r.alpha})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255, 255, 200, ${r.alpha * 0.55})`;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.radius * 0.55, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function updateRipples() {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.radius += 4.5;
    r.alpha -= 0.11;
    if (r.alpha <= 0.04) ripples.splice(i, 1);
  }
}

function update() {
  if (!running || paused) return;

  const newHead = { x: snake[0].x + vx, y: snake[0].y + vy };

  if (newHead.x < 0 || newHead.x >= tileCount || newHead.y < 0 || newHead.y >= tileCount) {
    return endGame();
  }

  snake.unshift(newHead);

  let collided = false;
  for (let i = 1; i < snake.length; i++) {
    if (snake[i].x === newHead.x && snake[i].y === newHead.y) {
      collided = true;
      break;
    }
  }

  if (collided) {
    snake.shift();
    return endGame();
  }

  const ateNormal = (newHead.x === food.x && newHead.y === food.y);
  let ateBonus = false;

  if (bonusFood && newHead.x === bonusFood.x && newHead.y === bonusFood.y) {
    ateBonus = true;
    const cx = bonusFood.x * gridSize + gridSize / 2;
    const cy = bonusFood.y * gridSize + gridSize / 2;
    ripples.push({ x: cx, y: cy, radius: 6, alpha: 0.95 });
    bonusFood = null;
  }

  if (ateNormal) {
    score++;
    document.getElementById('score').innerText = score;
    placeFood();
  } else if (ateBonus) {
    score += 2;
    document.getElementById('score').innerText = score;
    const tail = snake[snake.length - 1];
    snake.push({ x: tail.x, y: tail.y });
    placeFood();
  } else {
    snake.pop();
  }

  updateRipples();
  draw();
}

function placeFood() {
  do {
    food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
  } while (snake.some(s => s.x === food.x && s.y === food.y));

  if (!bonusFood && Math.random() < 0.12) {
    let newBonus = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
    if (!snake.some(s => s.x === newBonus.x && s.y === newBonus.y) && 
        !(newBonus.x === food.x && newBonus.y === food.y)) {
      bonusFood = newBonus;
    }
  }
}

function endGame() {
  running = false;
  clearInterval(interval);

  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#fff';
  ctx.font = '30px system-ui';
  ctx.textAlign = 'center';
  ctx.fillText('Game Over', canvas.width/2, 200);
  ctx.font = '20px system-ui';
  ctx.fillText('Score: ' + score, canvas.width/2, 245);
  ctx.font = '15px system-ui';
  ctx.fillText('Press R or click here to restart', canvas.width/2, 285);
}

function startGame() {
  clearInterval(interval);
  snake = [{ x: 12, y: 12 }];
  vx = 1; vy = 0;
  score = 0;
  document.getElementById('score').innerText = '0';
  food = { x: 18, y: 18 };
  bonusFood = null;
  ripples = [];
  running = true;
  paused = false;
  placeFood();
  draw();
  interval = setInterval(update, 135);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  if (!paused) interval = setInterval(update, 135);
  else clearInterval(interval);
}

// Use window instead of document for better focus reliability
window.addEventListener('keydown', e => {
  if (!running) {
    if (e.key.toLowerCase() === 'r') {
      startGame();
    }
    return;
  }

  const k = e.key.toLowerCase();

  if (k === ' ') {
    e.preventDefault();
    togglePause();
    return;
  }

  if ((k === 'arrowup' || k === 'w') && vy !== 1) { vx = 0; vy = -1; }
  else if ((k === 'arrowdown' || k === 's') && vy !== -1) { vx = 0; vy = 1; }
  else if ((k === 'arrowleft' || k === 'a') && vx !== 1) { vx = -1; vy = 0; }
  else if ((k === 'arrowright' || k === 'd') && vx !== -1) { vx = 1; vy = 0; }
});

// Click on canvas to restart when game is over
canvas.addEventListener('click', () => {
  if (!running) {
    startGame();
  }
});

// Initial screen
draw();
ctx.fillStyle = '#aaa';
ctx.font = '18px system-ui';
ctx.textAlign = 'center';
ctx.fillText('Click Start or press any key to begin', canvas.width/2, 220);
</script>
</body>
</html>
