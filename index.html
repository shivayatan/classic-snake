<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake</title>
    <style>
        body { background: #1a1a2e; color: #eaeaea; font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        h1 { color: #00ff9f; margin-bottom: 5px; }
        canvas { border: 4px solid #00ff9f; border-radius: 8px; background: #16213e; }
        .score { font-size: 22px; margin: 12px 0; color: #ffd700; }
        .instructions { color: #aaa; font-size: 14px; text-align: center; max-width: 380px; }
        button { background: #00ff9f; color: #1a1a2e; border: none; padding: 10px 24px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #00cc7a; }
    </style>
</head>
<body>
    <h1>🐍 Classic Snake</h1>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="instructions">
        Arrow Keys / WASD to move • Space to pause • R to restart<br>
        Eat red food to grow!
    </div>
    <button onclick="startGame()">Start Game</button>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const gridSize = 20;
const tileCount = 20;

let snake = [{x:10,y:10}];
let vx=1, vy=0;
let food = {x:15,y:15};
let score=0;
let interval=null;
let running=false;
let paused=false;

function draw() {
  ctx.fillStyle='#16213e'; ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#00ff9f';
  snake.forEach(s => ctx.fillRect(s.x*gridSize, s.y*gridSize, gridSize-2, gridSize-2));
  ctx.fillStyle='#ff4757';
  ctx.fillRect(food.x*gridSize, food.y*gridSize, gridSize-2, gridSize-2);
}

function update() {
  if(!running || paused) return;

  const head = {x: snake[0].x + vx, y: snake[0].y + vy};

  // Wall collision
  if(head.x<0 || head.x>=tileCount || head.y<0 || head.y>=tileCount) {
    return endGame();
  }

  // Self collision fix: ignore the tail if we're not eating
  const willEat = (head.x === food.x && head.y === food.y);
  const bodyToCheck = willEat ? snake : snake.slice(0, -1);

  if(bodyToCheck.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if(willEat) {
    score++;
    document.getElementById('score').innerText = score;
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function placeFood(){
  do {
    food = {x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount)};
  } while(snake.some(s => s.x===food.x && s.y===food.y));
}

function endGame(){
  running=false;
  clearInterval(interval);
  ctx.fillStyle='rgba(0,0,0,0.75)';
  ctx.fillRect(0,0,400,400);
  ctx.fillStyle='#fff';
  ctx.font='28px system-ui';
  ctx.textAlign='center';
  ctx.fillText('Game Over',200,170);
  ctx.font='18px system-ui';
  ctx.fillText('Score: '+score,200,210);
  ctx.font='14px system-ui';
  ctx.fillText('Press R to restart',200,250);
}

function startGame(){
  clearInterval(interval);
  snake=[{x:10,y:10}];
  vx=1; vy=0;
  score=0;
  document.getElementById('score').innerText='0';
  placeFood();
  running=true;
  paused=false;
  draw();
  interval = setInterval(update, 140);
}

function togglePause(){
  if(!running) return;
  paused = !paused;
  if(!paused) {
    interval = setInterval(update, 140);
  } else {
    clearInterval(interval);
  }
}

document.addEventListener('keydown', e => {
  if(!running) return;
  const k = e.key.toLowerCase();

  if(k === ' '){ e.preventDefault(); togglePause(); return; }
  if(k === 'r' && !running){ startGame(); return; }

  if((k==='arrowup' || k==='w') && vy !== 1){ vx=0; vy=-1; }
  else if((k==='arrowdown' || k==='s') && vy !== -1){ vx=0; vy=1; }
  else if((k==='arrowleft' || k==='a') && vx !== 1){ vx=-1; vy=0; }
  else if((k==='arrowright' || k==='d') && vx !== -1){ vx=1; vy=0; }
});

draw();
ctx.fillStyle='#aaa';
ctx.font='18px system-ui';
ctx.textAlign='center';
ctx.fillText('Click Start to Play',200,200);
</script>
</body>
</html>
